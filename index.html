<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<title>EQ DCC Style Guide</title>

<style>
body {
  font-family: Arial;
  margin: 0;
}

header {
  background: #3b74d7;
  color: white;
  padding: 15px;
}

.container {
  display: flex;
}

/* Sidebar */
nav.sidebar {
  width: 280px;
  background: #f5f5f5;
  padding: 10px;
  height: 100vh;
  overflow-y: auto;
}

nav.sidebar a {
  display: block;
  padding: 5px;
  cursor: pointer;
  color: blue;
  text-decoration: underline;
}

/* Main */
main {
  flex: 1;
  padding: 20px;
}

.hidden {
  display: none;
}

/* Highlight */
mark {
  background: yellow;
}
</style>
</head>

<body>

<!-- ✅ SEARCH BAR -->
<div style="padding:10px;">
  <input id="q" placeholder="Search...">
  <button data-action="searchtton data-action="clear-searchton data-action="expandn>
  <button data-action="collapse-all
</div>

<header>
  <h2>EQ DCC Style Guide</h2>
</header>

<div class="container">

  <!-- ✅ SIDEBAR -->
  <nav class="sidebar">
    <a class="toc-btn" data-target="scope">Scope</a>
    <a class="toc-btn" data-target="concept">Concept</a>
    <a class="toc-btn" data-target="task">Task</a>
    <a class="toc-btn" data-target="reference">Reference</a>
    <a class="toc-btn" data-target="cognitive">Cognitive Load</a>
  </nav>

  <!-- ✅ MAIN CONTENT -->
  <main>

    <!-- ✅ Scope -->
    <details class="sec">
      <summary id="scope">Scope</summary>
      <p>This style guide applies to all technical writers, engineers, SMEs, and stakeholders.</p>
      <p>Content follows a structured documentation approach: Concept, Task, Reference.</p>
    </details>

    <!-- ✅ Concept -->
    <details class="sec">
      <summary id="concept">Concept</summary>
      <p>A concept explains what something is, how it works, or why it matters.</p>
      <p>It provides the background knowledge before performing tasks.</p>
    </details>

    <!-- ✅ Task -->
    <details class="sec">
      <summary id="task">Task</summary>
      <p>A task describes how to perform an action using step-by-step procedures.</p>
    </details>

    <!-- ✅ Reference -->
    <details class="sec">
      <summary id="reference">Reference</summary>
      <p>Reference content includes specifications, parameters, tables, and structured data.</p>
    </details>

    <!-- ✅ Cognitive Load -->
    <details class="sec">
      <summary id="cognitive">Cognitive Load</summary>
      <p>Cognitive load refers to the mental effort required to process information.</p>
      <p>Reducing unnecessary information improves user understanding.</p>
    </details>

  </main>

</div>

<!-- ✅ JS -->
<script src="eq_dcc.js"></script>

</body>
</html>
