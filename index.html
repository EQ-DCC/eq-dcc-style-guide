
<!doctype html>
<html lang='en'>
<head>
<meta charset='utf-8'>
<meta name='viewport' content='width=device-width, initial-scale=1'>
<title>EQ DCC Style Guide — Interactive Manual</title>
<style>

:root{--brand-dark:#161878;--brand-blue:#3B82F6;--brand-orange:#FE8D01;--gray-50:#fafbff;--gray-100:#f2f4fb;--gray-200:#e6e9f2;--gray-300:#d3d8e6;--text:#1b1d25;--table-border:#7F7F7F;--table-header:#D0CECE}
*{box-sizing:border-box}
html,body{height:100%}
body{margin:0;font:16px/1.6 system-ui,-apple-system,Segoe UI,Roboto,Ubuntu,Helvetica,Arial,sans-serif;color:var(--text);background:#fff}
.banner{background:var(--brand-blue);color:#fff;padding:14px 16px;display:flex;align-items:center;gap:12px}
.banner .title{font-weight:700;font-size:18px}
.banner img{height:28px;width:auto;filter:brightness(0) invert(1)}
.top-controls{display:flex;align-items:center;justify-content:space-between;padding:10px 16px;border-bottom:1px solid var(--gray-200);gap:12px}
.top-controls .left{display:flex;align-items:center;gap:12px}
.top-controls .left img{height:40px;width:auto}
.top-controls h1{margin:0;color:var(--brand-dark)}
.top-controls .actions{display:flex;gap:8px;align-items:center}
.top-controls input[type=search]{padding:6px 10px;border:1px solid var(--gray-300);border-radius:6px;min-width:240px}
.top-controls button{padding:6px 12px;border:1px solid var(--brand-dark);background:#fff;color:var(--brand-dark);border-radius:6px;cursor:pointer}
.top-controls button.primary{background:var(--brand-orange);border-color:var(--brand-orange);color:#fff}
.container{display:grid;grid-template-columns:320px 1fr;min-height:calc(100vh - 48px)}
nav.sidebar{border-right:1px solid var(--gray-200);padding:16px;background:#f7f9ff;position:sticky;top:48px;height:calc(100vh - 48px);overflow:auto}
nav.sidebar h2{margin:0 0 12px 0;color:#0e1f4a}
nav.sidebar .toc,nav.sidebar .toc ul{list-style:none!important;padding-left:0;margin:0}
nav.sidebar .toc li{margin:6px 0}
nav.sidebar .toc-btn{display:flex;align-items:center;gap:8px;padding:8px 12px;border:1px solid var(--gray-200);border-radius:8px;background:#fff;color:#0e1f4a;text-decoration:none;box-shadow:0 1px 0 rgba(0,0,0,.03)}
nav.sidebar .toc-btn:hover{border-color:var(--brand-blue);box-shadow:0 0 0 2px rgba(59,130,246,.15)}
nav.sidebar .toc-btn.l1{font-weight:700;background:rgba(59,130,246,.12);border-color:var(--brand-blue)}
nav.sidebar .toc-btn.l2{padding-left:20px}
nav.sidebar .toc-btn.l3{padding-left:32px}
nav.sidebar .toc-btn.l4{padding-left:44px}
main.content{padding:24px}
main.content ul{list-style:disc;margin-left:1.25em}
main.content ul ul{list-style:circle}
main.content a{color:var(--brand-blue);text-decoration:underline}
.caption{color:var(--brand-blue);font-style:italic}
.table-wrap.styled{margin:12px 0;overflow:auto}
.table-wrap.styled table.styled{border-collapse:collapse;width:100%;background:#fff}
.table-wrap.styled th{border:1px solid var(--table-border);padding:8px;vertical-align:top;background:var(--table-header);font-weight:700;color:#000}
.table-wrap.styled td{border:1px solid var(--table-border);padding:8px;vertical-align:top}
.table-wrap.styled tr:nth-child(even) td{background:#fafafa}
summary{list-style:none}
details>summary h1,details>summary h2,details>summary h3,details>summary h4{display:inline}
details.sec{border:1px solid var(--gray-200);border-radius:8px;padding:8px 12px;margin:10px 0;background:#fff}
.section-body{padding:4px 2px 6px 2px}
.back-to-top{position:fixed;right:16px;bottom:16px;background:var(--brand-blue);color:#fff;border:none;border-radius:50%;width:44px;height:44px;font-size:20px;cursor:pointer;display:none}
.back-to-top.show{display:block}
</style>
</head>

    <details class="sec l1" open><summary id="scope"><h1>Scope</h1></summary><div class="section-body">
<p>This style guide applies to all technical writers, engineers, subject matter experts (SMEs), and stakeholders who create, review, or approve customer-facing documentation.</p>
<p>EQ_DCC technical writers will adhere to a structured documentation approach where content is written as independent, self-contained topics that can stand alone and be reused. Each topic covers one clear objective: understanding a concept, performing a task, or referencing information. </p>
<p>Modular documentation directly reduces cognitive load because it:</p>
<p>Prevents information overload.</p>
<p>Supports a predictable structure (concept-task-reference). </p>
<p>Limits the mental effort required to locate relevant information.  </p>
<p>Minimizes unnecessary reading.</p>
<p>Helps users learn or perform tasks with fewer distractions.</p>
<details class="sec l2" open><summary id="how-structured-documentation-benefits-users"><h2>How Structured Documentation Benefits Users</h2></summary><div class="section-body">
<p>Users find information faster.</p>
<p>Users read only what they need to complete a task.</p>
<p>Users do not sift through long chapters.</p>
<p>Information remains consistent across all manuals.</p>
</div></details>
<details class="sec l2" open><summary id="how-structured-documentation-benefits-technical-writers"><h2>How Structured Documentation Benefits Technical Writers</h2></summary><div class="section-body">
<p>Reduces duplication of content.</p>
<p>Enables easier collaboration.</p>
<p>Improves consistency in terminology and structure.</p>
<p>Supports content reuse.</p>
</div></details>
</div></details>
<details class="sec l1" open><summary id="key-definitions-acronyms"><h1>Key Definitions / Acronyms</h1></summary><div class="section-body">
<details class="sec l2" open><summary id="core-writing-concepts"><h2>Core Writing Concepts</h2></summary><div class="section-body">
<details class="sec l3" open><summary id="concept"><h3>Concept</h3></summary><div class="section-body">
<div class="table-wrap styled"><table class="styled">
<tr>
<th>Definition</th>
<th>A concept explains what something is, how it works, or why it matters. It provides the background knowledge a user needs before performing tasks or understanding system behavior. Concepts present information, not actions.</th>
</tr>
<tr>
<td>Purpose</td>
<td>Build user understanding.Clarify system principles, components, relationships, or constraints.Provide foundational knowledge required before tasks or procedures.</td>
</tr>
<tr>
<td>Characteristics</td>
<td>Non-procedural (no steps or actions).Uses clear, descriptive language.Uses noun-based headings</td>
</tr>
<tr>
<td>Examples</td>
<td>User Roles and PermissionsSystem RequirementsSafetyIntroductionSystem Overview</td>
</tr>
<tr>
<td>When to Use</td>
<td>When users need to learn about something before doing something.When introducing new products, features, technologies, or workflows.</td>
</tr>
</table></div>
</div></details>
<details class="sec l3" open><summary id="task"><h3>Task</h3></summary><div class="section-body">
<div class="table-wrap styled"><table class="styled">
<tr>
<th>Definition</th>
<th>A task is a procedural topic that explains how to do something. It contains a set of steps written in imperative commands.</th>
</tr>
<tr>
<td>Purpose</td>
<td>Direct users through actions with clear outcomes.Support installation, configuration, operation, troubleshooting, and maintenance.</td>
</tr>
<tr>
<td>Characteristics</td>
<td>Uses imperative verbs (for example, install, remove, connect).Uses numbered steps with one action per step.Includes prerequisites, tools, warnings, cautions, and expected results.</td>
</tr>
<tr>
<td>Examples</td>
<td>Filter Replacement ProcedureSoftware Update Procedure</td>
</tr>
<tr>
<td>When to Use</td>
<td>Whenever the user must perform an action.For any operation that has a sequential or procedural nature.</td>
</tr>
</table></div>
</div></details>
<details class="sec l3" open><summary id="reference"><h3>Reference</h3></summary><div class="section-body">
<div class="table-wrap styled"><table class="styled">
<tr>
<th>Definition</th>
<th>A reference provides factual, structured information that users look up rather than read sequentially. Reference content supports informed decisions and quick access to technical details.</th>
</tr>
<tr>
<td>Purpose</td>
<td>Present data, specifications, lists, tables, parameters, error codes, or configuration details.Give precise information without explanations or steps.</td>
</tr>
<tr>
<td>Characteristics</td>
<td>Uses tables, lists, diagrams, or parameter lists.Avoids narrative paragraphs unless needed for clarity.Contains no procedures or step-based instructions.</td>
</tr>
<tr>
<td>Examples</td>
<td>Technical Specifications TableError Codes and Corrective ActionsTorque ValuesConnector PinoutsSpare Parts ListUI Element Descriptions</td>
</tr>
<tr>
<td>When to Use</td>
<td>When users need fast access to exact information.When documenting constant values, rules, limits, definitions, or options.</td>
</tr>
</table></div>
</div></details>
<details class="sec l3" open><summary id="active-voice"><h3>Active Voice</h3></summary><div class="section-body">
<div class="table-wrap styled"><table class="styled">
<tr>
<th>Definition</th>
<th>A sentence structure in which the subject performs the action.</th>
</tr>
<tr>
<td>Why It Matters?</td>
<td>It improves clarity, reduces word count, and supports an instructional tone.</td>
</tr>
<tr>
<td>Use</td>
<td>Prefer active voice in instructions, descriptions, and warnings.</td>
</tr>
<tr>
<td>Example</td>
<td>Tighten the connector.</td>
</tr>
<tr>
<td>Avoid</td>
<td>The connector should be tightened.</td>
</tr>
</table></div>
</div></details>
<details class="sec l3" open><summary id="passive-voice"><h3>Passive Voice</h3></summary><div class="section-body">
<div class="table-wrap styled"><table class="styled">
<tr>
<th>Definition</th>
<th>A sentence structure in which the action happens to the subject.</th>
</tr>
<tr>
<td>Use</td>
<td>Use passive voice only when the actor is unknown or irrelevant, or when the object needs emphasis.</td>
</tr>
<tr>
<td>Example</td>
<td>The unit is calibrated at the factory.</td>
</tr>
</table></div>
</div></details>
<details class="sec l3" open><summary id="imperative-command"><h3>Imperative Command</h3></summary><div class="section-body">
<div class="table-wrap styled"><table class="styled">
<tr>
<th>Definition</th>
<th>A direct command form used for steps in procedures.</th>
</tr>
<tr>
<td>Use</td>
<td>Start each step with a verb in base form.</td>
</tr>
<tr>
<td>Examples</td>
<td>Install the driver.Replace the filter.Click OK.Click the Start button.</td>
</tr>
<tr>
<td>Avoid</td>
<td>You should press OK.Pressing OK will…</td>
</tr>
</table></div>
</div></details>
<details class="sec l3" open><summary id="procedure"><h3>Procedure</h3></summary><div class="section-body">
<div class="table-wrap styled"><table class="styled">
<tr>
<th>Definition</th>
<th>A numbered sequence of steps that enables a user to complete a task.</th>
</tr>
<tr>
<td>Use</td>
<td>Include prerequisites, tools, and expected outcomes. Use one action per step when possible. If additional explanation or results are needed, present them in paragraph format.</td>
</tr>
<tr>
<td>Examples</td>
<td>Disconnect power.Remove the front cover.Install the module.See .</td>
</tr>
</table></div>
</div></details>
<details class="sec l3" open><summary id="step-and-substep"><h3>Step and Substep</h3></summary><div class="section-body">
<div class="table-wrap styled"><table class="styled">
<tr>
<th>Definition</th>
<th>A step is a primary action; a substep breaks a step into smaller actions.</th>
</tr>
<tr>
<td>Use</td>
<td>Use substeps when an action requires ordered micro-actions.</td>
</tr>
<tr>
<td>Examples</td>
<td>Remove the cover.Remove the two M3 screws.Lift the cover upward.See .</td>
</tr>
</table></div>
</div></details>
<details class="sec l3" open><summary id="prerequisite"><h3>Prerequisite</h3></summary><div class="section-body">
<div class="table-wrap styled"><table class="styled">
<tr>
<th>Definition</th>
<th>A condition, configuration, tool, or permission required before a procedure starts.</th>
</tr>
<tr>
<td>Use</td>
<td>Place prerequisites at the start of the procedure.</td>
</tr>
</table></div>
</div></details>
<details class="sec l3" open><summary id="outcome-or-results"><h3>Outcome or Results</h3></summary><div class="section-body">
<div class="table-wrap styled"><table class="styled">
<tr>
<th>Definition</th>
<th>The expected state after a step or procedure is completed.</th>
</tr>
<tr>
<td>Use</td>
<td>Provide expected results to confirm success or to guide troubleshooting.</td>
</tr>
<tr>
<td>Examples</td>
<td>The status LED remains solid green.The Window Box screen appears.</td>
</tr>
</table></div>
</div></details>
<details class="sec l3" open><summary id="noun-based-heading"><h3>Noun Based Heading</h3></summary><div class="section-body">
<div class="table-wrap styled"><table class="styled">
<tr>
<th>Definition</th>
<th>A heading that starts with a noun or noun phrase to improve consistency.</th>
</tr>
<tr>
<td>Use</td>
<td>System OverviewPower RequirementsNetwork ConfigurationsFilter Replacement</td>
</tr>
<tr>
<td>Example</td>
<td>Applicable for concept topics.</td>
</tr>
<tr>
<td>Avoid</td>
<td>Verb-leading forms such as:Understanding the SystemConfiguring the Network</td>
</tr>
</table></div>
</div></details>
</div></details>
<details class="sec l2" open><summary id="how-concept-task-and-reference-work-together"><h2>How Concept, Task, and Reference Work Together</h2></summary><div class="section-body">
<p>In structured technical documentation, these three topics form the foundation of information architecture:</p>
<p>Concept = Understanding</p>
<p>Task = Doing</p>
<p>Reference = Looking up</p>
<p>They are usually organized so that the user first understands a concept (if required), then performs a task, and uses reference details as needed for accuracy and verification.</p>
<p>Example workflow:</p>
<p>Concept: Battery System Overview</p>
<p>Task: Battery Replacement Procedure</p>
<p>Battery Specifications and Part Numbers</p>
<p>Organizing content in this way reduces cognitive load, improves usability, and supports structured documentation.</p>
<details class="sec l3" open><summary id="cognitive-load"><h3>Cognitive Load</h3></summary><div class="section-body">
<p>Cognitive load refers to the amount of mental effort required for a user to understand information, make decisions, or complete tasks. In technical documentation, cognitive load increases when the user must interpret complex explanations, hold many details in working memory, switch contexts, or fill in missing information.</p>
<details class="sec l4" open><summary id="why-it-matters"><h4>Why It Matters</h4></summary><div class="section-body">
<p>User manuals should reduce cognitive load so users can focus on performing tasks safely and accurately. Excessive cognitive load leads to user errors, slower task completion, and confusion. In safety-critical environments, it can create risks.</p>
</div></details>
<details class="sec l4" open><summary id="how-to-reduce-cognitive-load"><h4>How to Reduce Cognitive Load</h4></summary><div class="section-body">
<p>Use simple, direct sentences to minimize interpretation effort. </p>
<p>Provide one idea per sentence and one action per procedural step. </p>
<p>Organize content logically so users do not need to jump back and forth between sections. </p>
<p>Use clear visual cues, such as tables, bullet lists, and callouts, to help users scan information. </p>
<p>Use consistent terminology so users do not waste mental effort interpreting synonyms. </p>
<p>Use illustrations to replace long technical descriptions when appropriate. </p>
<p>Avoid unnecessary background information, especially before tasks. </p>
<p>Place concepts before tasks only when needed for understanding.</p>
<p>Example
Instead of describing a mechanism in detail before teaching how to operate it, provide a short “What you need to know” concept section, then go directly to the procedure.</p>
<p>Good documentation reduces cognitive load by:</p>
<p>Presenting information in predictable patterns.</p>
<p>Using structured topics (concept, task, reference).</p>
<p>Avoiding unnecessary complexity.</p>
<p>Supporting “read-to-do” or “read-to-find” behavior.</p>
</div></details>
</div></details>
</div></details>
</div></details>
<details class="sec l1" open><summary id="document-structure"><h1>Document Structure</h1></summary><div class="section-body">
<details class="sec l2" open><summary id="color-usage-standards"><h2>Color Usage Standards</h2></summary><div class="section-body">
<p>The color wheel helps writers and illustrators maintain consistent visual style across all manuals. It ensures diagrams, callouts, UI labels, and warnings follow a predictable and accessible color scheme.</p>
<p>Use colors and shapes for callouts consistently throughout the document. </p>
<p>For example, if you use a colored callout box for UI labels, continue using that style for all UI references. </p>
<p>If you use a balloon with an arrow to identify hardware components, keep using that same style for all component callouts. </p>
<p>You may mix different shapes for different purposes, but each type must be used consistently.</p>

<details class="sec l3" open><summary id="hmi-or-ui-accent-colors-follow-hmi-display"><h3>HMI or UI Accent Colors (Follow HMI display)</h3></summary><div class="section-body">
<p>Used for:</p>
<p>UI callouts</p>
<p>UI element highlighting</p>
<p>Screenshot annotations</p>
<p>These colors must match the dominant hues of the HMI or dashboard. When labeling screenshots, fill callout boxes with colors that match or complement the HMI’s main palette.</p>
</div></details>
</div></details>
<details class="sec l2" open><summary id="noun-based-headings"><h2>Noun-Based Headings</h2></summary><div class="section-body">
<p>Headings must be:</p>
<p>Specific</p>
<p>Noun-focused</p>
<p>Consistent in form</p>
<p>Clear and concise</p>
<p>Examples:</p>
<p>System Overview</p>
<p>Component Description</p>
<p>Battery Replacement Procedure</p>
<p>Safety Requirements</p>
<p>Avoid verb-based headings such as:</p>
<p>Configuring the System. </p>
</div></details>
<details class="sec l2" open><summary id="numbering-conventions"><h2>Numbering Conventions</h2></summary><div class="section-body">
<details class="sec l3" open><summary id="sections-numbering"><h3>Sections Numbering</h3></summary><div class="section-body">
<p>Level 1: 1., 2., 3. </p>
<p>Level 2: 1.1, 1.2, 1.3</p>
<p>Level 3: 1.1.1</p>
<p>Avoid going deeper than three levels unless required by product complexity. </p>
</div></details>
<details class="sec l3" open><summary id="numbering-for-procedures"><h3>Numbering for Procedures</h3></summary><div class="section-body">
<p>Use numbered lists for procedure steps. Numbering communicates order and sequence.</p>
<p>Remove the cover. </p>
<p>Use the following conventions for illustrations and callouts:</p>
<p>Table 3: Callouts</p>
<div class="table-wrap styled"><table class="styled">
<tr>
<th>Type</th>
<th>Illustration</th>
</tr>
<tr>
<td>Straight arrows (solid ends)</td>
<td>Used for mechanical components. Point directly to a specific location or component. </td>
</tr>
<tr>
<td>No arrowheads</td>
<td>Used when the component is shown in isolation or when a minimalistic style is preferred. </td>
</tr>
<tr>
<td>Ball-end arrows</td>
<td>Used for identifying grouped or closely related components.</td>
</tr>
<tr>
<td>UI callout style</td>
<td>Use rectangular or rounded callouts with fill color matching the dominant HMI palette.Maintain consistent colors and styles across all UI screenshots.</td>
</tr>
</table></div>
<p>Callouts directly inserted in word is preferred for content reuse.</p>
<p>If a different arrow-end style is preferred, such as:</p>
<p>Open arrowheads</p>
<p>Curved arrows</p>
<p>… this is acceptable as long as the style is applied consistently in all illustrations within that document.</p>
<p>When labelling user interface components such as buttons, menus, icons, and status indicators:</p>
<p>Use rectangular or rounded with a fill color.</p>
<p>The fill color must match or complement the dominant color in the HMI (Human Machine Display) to maintain visual harmony and reduce distraction. </p>
<p>Photos may be prepared and resized using Adobe Photoshop (Recommended size: 2.35 x 3 inches at 300 dpi) for:</p>
<p>Precise dimension control.</p>
<p>Color management and advanced editing functions.</p>
<p>High-quality output suitable for printing (if required).</p>
<p>Export Format:</p>
<p>PNG preferred for icons and buttons</p>
<p>JPG (high quality) for photographs</p>
<p>Install the module.</p>
<p>Verify the alignment.</p>
</div></details>
<details class="sec l3" open><summary id="bullet-lists"><h3>Bullet Lists</h3></summary><div class="section-body">
<p>Use bullets for non-sequential or unordered information. Bullets help reduce cognitive load and make information easier to scan.</p>
<p>Use a simple round bullet (•) for the first level.</p>
<p>Use a clear secondary bullet (○) for the second level.</p>
<p>Keep bullet text short and consistent in structure.</p>
<p>Avoid ending bullets with periods unless the bullet is a complete sentence.</p>
<p>Limit bullet lists to a maximum of two levels where possible.</p>
<p>Bullets may appear within a numbered step but must still follow the two-level maximum.</p>
<p>Example:</p>
<p>First-level bullet</p>
<p>Second-level bullet</p>
</div></details>
<details class="sec l3" open><summary id="step-numbering"><h3>Step Numbering</h3></summary><div class="section-body">
<p>Use numbered lists for procedures. Include substeps when necessary.</p>
<p>Example:</p>
<p>Remove the cover.</p>
<p>Remove the screws.</p>
<p>Lift the panel.</p>
</div></details>
<details class="sec l3" open><summary id="figure-and-table-numbering"><h3>Figure and Table Numbering</h3></summary><div class="section-body">
<p>Number figures and tables consistently throughout the document to support clear reference and navigation.</p>
<details class="sec l4" open><summary id="caption-style"><h4>Caption Style</h4></summary><div class="section-body">
<p>Use sequential numbering.</p>
<p>Capitalize the first letter of every word in the caption.</p>
<p>Keep captions short, direct, and descriptive.</p>
<p>Avoid noun clusters longer than four nouns to prevent overlay complex captions.</p>
<p>Examples:</p>
<p>Preferred: Figure 1: Fan Assembly Layout (3 nouns)</p>
<p>Avoid: Figure 1: Main Control Panel Power Supply Fuse Location Chart (7 nouns)</p>
<p>Figure 1: Gantry Assembly Location</p>
<p>Table 4: Milling Machine Overview</p>
<div class="table-wrap styled"><table class="styled">
<tr>
<th>Header</th>
<th>Header</th>
</tr>
<tr>
<td>Data</td>
<td>Data</td>
</tr>
</table></div>
</div></details>
<details class="sec l4" open><summary id="captions-usage-rules"><h4>Captions Usage Rules</h4></summary><div class="section-body">
<p>Image captions apply to concept topics only. </p>
<p>Captions may be used when explaining system features, component identification, architecture, or reference information.</p>
<p>Do not use captions within procedures.</p>
<p>Images that appear inside task-oriented content (procedures) must not include captions because they:</p>
<p>interrupt step flow, and </p>
<p>create redundancy with the step text.</p>
<p>Instead reference the images directly inside the step text using simple statements such as:</p>
<p>See the image below.</p>
<p>Refer to the illustration on the right.</p>
</div></details>
</div></details>
<details class="sec l3" open><summary id="image-file-naming-convention"><h3>Image File Naming Convention</h3></summary><div class="section-body">
<p>To maintain consistency and traceability, follow a standardized naming format (recommended but not required).</p>
<details class="sec l4" open><summary id="images"><h4>Images</h4></summary><div class="section-body">
<p>Use the following convention for screenshots:</p>
<p>projectcode_typeofdocument_module_nnn_xx</p>
<p>For examples:</p>
<p>mlx_siemens_win_(var)_001_ml</p>
<p>mlx_siemens_btn_(var)_001_ml</p>
<p>Use the following conventional for photographs, illustrations, and diagrams.</p>
<p>manualtype_module_nnn_xx</p>
<p>For example:</p>
<p>mm_CNC_001_ry</p>
</div></details>
</div></details>
<details class="sec l3" open><summary id="user-manuals-filename"><h3>User Manuals Filename</h3></summary><div class="section-body">
<p>Why filename format is important? </p>
<p>Use the recommended structure (lowercase): </p>
<p>PROJECTCODE_UserManualTitleSubject_Rev1</p>
<p>dnd_milling_maintenance_manual_rev1</p>
<p>or keep the existing format:</p>
<p>Zirconia Milling Cell Maintenance Manual Rev1</p>
<details class="sec l4" open><summary id="supports-effective-search"><h4>Supports Effective Search</h4></summary><div class="section-body">
<p>Clear and structured filenames allow:</p>
<p>Faster filtering in shared drives.</p>
<p>Easy identification of manuals belonging to a specific product line or project.</p>
<p>Improved search results using predictable patterns (for example, searching by project code).</p>
</div></details>
<details class="sec l4" open><summary id="enables-metadata-accuracy"><h4>Enables Metadata Accuracy</h4></summary><div class="section-body">
<p>Metadata improves search, filtering, and reuse.</p>
<p>Metadata fields must be completed consistently to ensure accurate indexing and retrieval across document systems.</p>
<details class="sec l5" open><summary id="word-document-metadata"><h5>Word Document Metadata</h5></summary><div class="section-body">
<p>Set the following fields under File Info Properties.</p>
<div class="table-wrap styled"><table class="styled">
<tr>
<th>Metadata Field</th>
<th>Required Value</th>
</tr>
<tr>
<td>Title</td>
<td>Full document title
(Subject + Category + Revision number)</td>
</tr>
<tr>
<td>Subject</td>
<td>Product or system name</td>
</tr>
<tr>
<td>Author</td>
<td>Document owner, team, or company name</td>
</tr>
<tr>
<td>Company</td>
<td>Leave blank unless required</td>
</tr>
<tr>
<td>Tags</td>
<td>Project code, product type, revision</td>
</tr>
<tr>
<td>Comments</td>
<td>Notes for reviewers or source information</td>
</tr>
<tr>
<td>Category</td>
<td>“User Manual” or appropriate document type</td>
</tr>
</table></div>
</div></details>

<details class="sec l1" open><summary id="writing-principles"><h1>Writing Principles</h1></summary><div class="section-body">
<details class="sec l2" open><summary id="use-active-voice"><h2>Use Active Voice</h2></summary><div class="section-body">
<p>Use passive voice only when it doesn’t matter who performs the action or when the person doing the action is unknown.</p>
</div></details>
<details class="sec l2" open><summary id="avoid-gerunds-ing-forms"><h2>Avoid Gerunds (-ing forms)</h2></summary><div class="section-body">
<p>Rewrite sentences to eliminate gerunds when possible.</p>
<p>Use verbs in their base (imperative) form.</p>
<p>Examples:</p>
<p>Prefer: Press the button.</p>
<p>Avoid: Pressing the button triggers the system.</p>
</div></details>
<details class="sec l2" open><summary id="use-imperative-commands-for-procedures"><h2>Use Imperative Commands for Procedures</h2></summary><div class="section-body">
<p>Use direct commands for procedural steps.</p>
<p>Examples:</p>
<p>Install the bracket.</p>
<p>Connect the cable.</p>
<p>Verify the connection.</p>
<p>Avoid auxiliary verbs: may, might, could, should in steps.</p>
</div></details>
<details class="sec l2" open><summary id="preferred-voice-for-addressing-users"><h2>Preferred Voice for Addressing Users</h2></summary><div class="section-body">
<p>Use neutral, third-person terms such as users, operators, technicians or other role-based nouns instead of second person (you).</p>
<p>In procedural steps, use imperative verbs; the subject is understood and does not need to be written.</p>
<p>Examples:</p>
<p>Replace the filter.</p>
<p>Install the module.</p>
<p>Verify the alignment.</p>
</div></details>
</div></details>
<details class="sec l1" open><summary id="grammar-and-style-rules"><h1>Grammar and Style Rules</h1></summary><div class="section-body">
<details class="sec l2" open><summary id="terminology"><h2>Terminology</h2></summary><div class="section-body">
<p>Ensure consistent terminology across all manuals.</p>
<p>Use approved terms from the .</p>
<p>Use one term for one concept.</p>
<p>Example:</p>
<p>Use pushbutton, not sometimes button and other times switch</p>
<p>Prefer industry-standard terminology over internal jargon.</p>
<p>Define uncommon or highly technical terms at their first occurrence.</p>
<p>UI actions: </p>
<p>Use Click for clickable UI elements (buttons, icons).</p>
<p>Use Select for choosing an option from a dropdown or list.</p>
<p>Format UI labels in bold, matching the exact spelling and casing on the HMI or UI.</p>
<p>Hardware buttons:</p>
<p>Use Press for physical hardware buttons.</p>
<p>Format hardware button labels in ALL CAPS and not bold.</p>
<p>Example:</p>
<p>Press START.</p>
<p>Use the label exactly as printed on the device or hardware panel. </p>
<details class="sec l3" open><summary id="common-terms-to-avoid"><h3>Common Terms to Avoid</h3></summary><div class="section-body">
<p>Table 5: Common Terms to Avoid</p>
<div class="table-wrap styled"><table class="styled">
<tr>
<th>Avoid</th>
<th>Reason</th>
<th>Recommended</th>
<th>Incorrect Example</th>
<th>Corrected Example</th>
</tr>
<tr>
<td>may</td>
<td>Unclear meaning</td>
<td>can, might, is permitted to</td>
<td>You may start…</td>
<td>You can start…</td>
</tr>
<tr>
<td>a few / several</td>
<td>Not measurable</td>
<td>Give exact number</td>
<td>Wait a few minutes.</td>
<td>Wait 3 min.</td>
</tr>
<tr>
<td>abort</td>
<td>Harsh; safety connotation</td>
<td>cancel, stop</td>
<td>Abort the process.</td>
<td>Cancel the process.</td>
</tr>
<tr>
<td>about / approximately</td>
<td>May invite tolerance confusion</td>
<td>Give tolerance or range</td>
<td>About 10 mm.</td>
<td>10 mm ± 0.5 mm.</td>
</tr>
<tr>
<td>above / below</td>
<td>Depends on page layout; unclear in digital docs</td>
<td>top, bottom</td>
<td>See the image above.</td>
<td>See the image at the top.</td>
</tr>
<tr>
<td>and so on</td>
<td>Vague</td>
<td>Finish the list or reframe</td>
<td>Measure voltage, current, and so on.</td>
<td>Measure voltage and current.</td>
</tr>
<tr>
<td>and/or</td>
<td>Hard to read</td>
<td>Rewrite explicitly; say it directly</td>
<td>Install A and/or B.</td>
<td>Install A, B, or both.</td>
</tr>
<tr>
<td>before / after (no reference)</td>
<td>Can be unclear</td>
<td>after Step X</td>
<td>Do this after mounting.</td>
<td>Do this after Step 3.</td>
</tr>
<tr>
<td>before/after (temporal ambiguity)</td>
<td>Can be misread</td>
<td>previous/next, or specify step</td>
<td>Do this after mounting.</td>
<td>After you complete Step 3, do this.</td>
</tr>
<tr>
<td>better / best (claims)</td>
<td>Marketing, subjective</td>
<td>Provide measured value</td>
<td>Best-in-class.</td>
<td>Response time &lt; 2 ms.</td>
</tr>
<tr>
<td>blacklist/whitelist</td>
<td>Non-inclusive</td>
<td>blocklist/allowlist</td>
<td>Add to whitelist.</td>
<td>Add to allowlist.</td>
</tr>
<tr>
<td>bug</td>
<td>Internal jargon</td>
<td>defect, known issue</td>
<td>Known bugs.</td>
<td>Known issues.</td>
</tr>
<tr>
<td>carefully / properly</td>
<td>Subjective</td>
<td>Give measurable instruction</td>
<td>Tighten carefully.(can be considered make sure to refer to the torque specifications table)</td>
<td>Tighten to 3 N·m.</td>
</tr>
<tr>
<td>commence / cease</td>
<td>Formal</td>
<td>start / stop</td>
<td>Commence the test.</td>
<td>Start the test.</td>
</tr>
<tr>
<td>current (time context)</td>
<td>Conflicts with electrical current</td>
<td>this, active, working directory</td>
<td>Save in the current folder.</td>
<td>Save in this folder.</td>
</tr>
<tr>
<td>current (time meaning)</td>
<td>Can be confused with electrical current</td>
<td>this, active, working</td>
<td>Save in the current folder.</td>
<td>Save in this folder.</td>
</tr>
<tr>
<td>enable/disable (for people)</td>
<td>Use for system states, not users</td>
<td>Use with features, not people</td>
<td>Disable users.</td>
<td>Disable the feature for users.</td>
</tr>
<tr>
<td>etc.</td>
<td>Leaves scope unclear; vague end to a list</td>
<td>Complete the list or say &quot;for example&quot;</td>
<td>Use clips, ties, etc.</td>
<td>Use clips or ties. / For example, clips or ties.</td>
</tr>
<tr>
<td>Execute (user action)</td>
<td>Internal jargon</td>
<td>run, start</td>
<td>Execute the script.</td>
<td>Run the script.</td>
</tr>
<tr>
<td>fast / faster</td>
<td>Vague</td>
<td>Provide metric</td>
<td>Use faster mode.</td>
<td>Use High mode (≥ 10 MB/s).</td>
</tr>
<tr>
<td>few / many</td>
<td>Vague</td>
<td>Provide count</td>
<td>Many errors.</td>
<td>More than 5 errors.</td>
</tr>
<tr>
<td>fire</td>
<td>Informal</td>
<td>trigger, start</td>
<td>Fire the event.</td>
<td>Trigger the event.</td>
</tr>
<tr>
<td>follow (for rules)</td>
<td>Sounds optional</td>
<td>obey, comply with</td>
<td>Follow the limits.</td>
<td>Obey the limits.</td>
</tr>
<tr>
<td>handle (errors)</td>
<td>Vague</td>
<td>log, retry, show message, stop</td>
<td>Handle the error.</td>
<td>Show an error message and stop the process.</td>
</tr>
<tr>
<td>impact (verb)</td>
<td>Informal</td>
<td>affect</td>
<td>Impacts performance.</td>
<td>Affects performance.</td>
</tr>
<tr>
<td>include (as instruction)</td>
<td>Not a clear action</td>
<td>obey, add, list</td>
<td>Include safety rules…</td>
<td>Obey safety rules.</td>
</tr>
<tr>
<td>inside / outside</td>
<td>Vague; physical vs. logical</td>
<td>internal, external</td>
<td>Inside the cover…</td>
<td>In the internal area…</td>
</tr>
<tr>
<td>interior / exterior</td>
<td>Formal; same issue as inside/outside</td>
<td>internal, external</td>
<td>The exterior panel…</td>
<td>The external panel…</td>
</tr>
<tr>
<td>intuitively / obviously</td>
<td>Assumes knowledge</td>
<td>Remove or clarify</td>
<td>Obviously, select X.</td>
<td>Select X.</td>
</tr>
<tr>
<td>issue (as a verb)</td>
<td>Formal, bureaucratic</td>
<td>send, provide, generate</td>
<td>Issue a command.</td>
<td>Send a command.</td>
</tr>
<tr>
<td>issue (noun – broad)</td>
<td>Too broad</td>
<td>fault, problem, alarm</td>
<td>Report an issue.</td>
<td>Report a fault.</td>
</tr>
<tr>
<td>issue (noun – vague)</td>
<td>Vague</td>
<td>problem, fault, defect, alarm</td>
<td>Report an issue.</td>
<td>Report a fault.</td>
</tr>
<tr>
<td>kill (process)</td>
<td>Harsh; non-inclusive</td>
<td>stop, end</td>
<td>Kill the task.</td>
<td>Stop the task.</td>
</tr>
<tr>
<td>light / heavy (load)</td>
<td>Vague</td>
<td>Provide range</td>
<td>Heavy load.</td>
<td>Load &gt; 75%.</td>
</tr>
<tr>
<td>man-hours</td>
<td>Non-inclusive</td>
<td>person-hours, labor hours</td>
<td>100 man-hours.</td>
<td>100 person-hours.</td>
</tr>
<tr>
<td>master/slave</td>
<td>Non-inclusive</td>
<td>primary/secondary, controller/worker</td>
<td>Master device.</td>
<td>Primary device.</td>
</tr>
<tr>
<td>may (permission vs. possibility)</td>
<td>Ambiguous</td>
<td>can (ability), might (possibility), is permitted to (permission)</td>
<td>You may start the pump.</td>
<td>You can start the pump.</td>
</tr>
<tr>
<td>normal / typical</td>
<td>Vague</td>
<td>Give range</td>
<td>Normal current…</td>
<td>Current is 8–12 A.</td>
</tr>
<tr>
<td>observe</td>
<td>Formal</td>
<td>see</td>
<td>Observe Section 4.</td>
<td>See Section 4.</td>
</tr>
<tr>
<td>OK vs Okay</td>
<td>Inconsistency</td>
<td>Use OK (UI label), not “Okay”</td>
<td>Click Okay.</td>
<td>Click OK.</td>
</tr>
<tr>
<td>open/close (states)</td>
<td>Confused with hardware states</td>
<td>Use on/off for power; use open/close for files/valves</td>
<td>Open the power.</td>
<td>Turn ON the power.</td>
</tr>
<tr>
<td>optimize (as an instruction)</td>
<td>Not actionable</td>
<td>Specify the action; give exact setting</td>
<td>Optimize the settings.</td>
<td>Set Gain to 2.0 and Offset to −0.1.</td>
</tr>
<tr>
<td>optimize (as instruction – repetition)</td>
<td>Not actionable</td>
<td>Give exact setting</td>
<td>Optimize the system.</td>
<td>Set Speed to 100%.</td>
</tr>
<tr>
<td>outside diameter</td>
<td>Ambiguous</td>
<td>outer diameter (OD)</td>
<td>Measure the outside diameter.</td>
<td>Measure the outer diameter (OD).</td>
</tr>
<tr>
<td>perform (generic)</td>
<td>Wordy, vague action</td>
<td>Use the specific verb (press, click, install, run, test)</td>
<td>Perform a reset.</td>
<td>Press RESET.</td>
</tr>
<tr>
<td>power cycle / cycle power</td>
<td>Jargon, not universal</td>
<td>Turn OFF, then turn ON</td>
<td>Cycle power.</td>
<td>Turn OFF, then turn ON.</td>
</tr>
<tr>
<td>present</td>
<td>Too formal; unclear</td>
<td>now, currently</td>
<td>The present value…</td>
<td>The value now…</td>
</tr>
<tr>
<td>present (time context)</td>
<td>Formal; can mean “to show”</td>
<td>now, currently</td>
<td>The present value is 10.</td>
<td>The value is 10 now.</td>
</tr>
<tr>
<td>press and hold (no duration)</td>
<td>Not measurable</td>
<td>Press and hold for X s</td>
<td>Press and hold START.</td>
<td>Press and hold START for 5 s.</td>
</tr>
<tr>
<td>press and hold (without duration – repetition)</td>
<td>Ambiguous; not measurable</td>
<td>Press and hold for 3 s</td>
<td>Press and hold RESET.</td>
<td>Press and hold RESET for 3 s.</td>
</tr>
<tr>
<td>prior to / subsequent to</td>
<td>Formal</td>
<td>before / after</td>
<td>Prior to installation…</td>
<td>Before installation…</td>
</tr>
<tr>
<td>quickly / slowly</td>
<td>Subjective</td>
<td>Give a value (within 5 s, at 10 mm/s)</td>
<td>Close the valve slowly.</td>
<td>Close the valve at 10 mm/s.</td>
</tr>
<tr>
<td>respect (as “follow”)</td>
<td>Non-idiomatic</td>
<td>follow, comply with</td>
<td>Respect the limits.</td>
<td>Comply with the limits.</td>
</tr>
<tr>
<td>respectively</td>
<td>Hard to read</td>
<td>Break into clear sentences</td>
<td>X and Y connect to A and B, respectively.</td>
<td>Connect X to A. Connect Y to B.</td>
</tr>
<tr>
<td>shall</td>
<td>Legalistic</td>
<td>must</td>
<td>The user shall…</td>
<td>The user must…</td>
</tr>
<tr>
<td>shall (legalistic – repetition)</td>
<td>Standard only in specs/contracts</td>
<td>must</td>
<td>The user shall…</td>
<td>The user must…</td>
</tr>
<tr>
<td>short/long press</td>
<td>Vague</td>
<td>Give seconds</td>
<td>Long press START.</td>
<td>Press and hold START for 5 s.</td>
</tr>
<tr>
<td>short/long press (repetition)</td>
<td>Vague</td>
<td>Use seconds</td>
<td>Long press…</td>
<td>Press and hold for 3 s.</td>
</tr>
<tr>
<td>should</td>
<td>Weak requirement</td>
<td>must, recommended</td>
<td>You should wear PPE.</td>
<td>You must wear PPE.</td>
</tr>
<tr>
<td>should (requirement? – repetition)</td>
<td>Weak requirement</td>
<td>must (required), recommended (advisory)</td>
<td>You should wear PPE.</td>
<td>You must wear PPE.</td>
</tr>
<tr>
<td>significant</td>
<td>Subjective</td>
<td>Quantify</td>
<td>Significant drop.</td>
<td>Drop of &gt; 10%.</td>
</tr>
<tr>
<td>significant / noticeable</td>
<td>Vague</td>
<td>Give a number</td>
<td>Significant drop.</td>
<td>Drop of &gt; 10%.</td>
</tr>
<tr>
<td>simply / just</td>
<td>Patronizing</td>
<td>Remove or clarify</td>
<td>Just click…</td>
<td>Click Start.</td>
</tr>
<tr>
<td>simply / just (minimizes)</td>
<td>Patronizing</td>
<td>Remove or explain steps</td>
<td>Just click Start.</td>
<td>Click Start.</td>
</tr>
<tr>
<td>sufficient / adequate</td>
<td>Subjective</td>
<td>Give criteria</td>
<td>Ensure adequate airflow.</td>
<td>Ensure ≥ 200 L/min airflow.</td>
</tr>
<tr>
<td>support</td>
<td>Vague</td>
<td>is compatible with, includes</td>
<td>Supports Modbus.</td>
<td>Is compatible with Modbus RTU.</td>
</tr>
<tr>
<td>support (feature)</td>
<td>Ambiguous scope</td>
<td>works with, is compatible with, includes</td>
<td>Supports Modbus.</td>
<td>Is compatible with Modbus RTU.</td>
</tr>
<tr>
<td>terminate</td>
<td>Legal tone</td>
<td>stop, end</td>
<td>Terminate the program.</td>
<td>Stop the program.</td>
</tr>
<tr>
<td>the following</td>
<td>Wordy</td>
<td>that follows or use a heading (Steps:)</td>
<td>Do the following steps.</td>
<td>Do these steps.</td>
</tr>
<tr>
<td>throw (error)</td>
<td>Internal jargon</td>
<td>show, return, generate</td>
<td>The API throws 404.</td>
<td>The API returns 404.</td>
</tr>
<tr>
<td>tip / trick</td>
<td>Informal</td>
<td>Note (if needed)</td>
<td>Tip: restart app.</td>
<td>Note: Restart the app.</td>
</tr>
<tr>
<td>utilize</td>
<td>Unnecessary formality</td>
<td>use</td>
<td>Utilize the tool…</td>
<td>Use the tool…</td>
</tr>
<tr>
<td>via</td>
<td>Can confuse nonnative readers</td>
<td>through, using, by</td>
<td>Connect via USB.</td>
<td>Connect using USB.</td>
</tr>
</table></div>
</div></details>
<details class="sec l3" open><summary id="notes-to-align-with-ste-principles"><h3>Notes to Align with STE Principles</h3></summary><div class="section-body">
<p>Prefer short, concrete verbs in the imperative for procedures.</p>
<p>Example:</p>
<p>Press, Click, Select Install, Connect, Tighten, Measure.</p>
<p>Avoid phrasal verbs when a single verb is clearer.</p>
<p>Example:</p>
<p>Turn off  switch off is fine in user manuals but in some contexts prefer de-energize for safety.</p>
</div></details>
</div></details>
<details class="sec l2" open><summary id="measurement-and-units"><h2>Measurement and Units</h2></summary><div class="section-body">
<p>Present technical data precisely and consistently. Use standard SI and non-SI units according to engineering conventions.</p>
<details class="sec l3" open><summary id="spacing-rules"><h3>Spacing Rules</h3></summary><div class="section-body">
<p>Always place a non-breaking space between a number and a unit symbol. A non-breaking space (keyboard shortcut: Ctrl + Shift + spacebar) appears as a degree-like circle between words when you show paragraph marks <img src="data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAADMAAAAyCAYAAADx/eOPAAAAAXNSR0IArs4c6QAAAARnQU1BAACxjwv8YQUAAAAJcEhZcwAADsMAAA7DAcdvqGQAAAI8SURBVGhD7Zq7rqpAFIZ/EcF4QQtL9Qmwd0piyQOoD7PfxdY3sLG3Fxu1s7WQBBJu4mnc5rjYG8lxEPTwVfDPCszHAkYSS8vl8oIPQaDBO1PI5JVCJq98lEzp71fzarXCcDi8r7giyzJkWYYoihCEdK9BGIYIggCe58FxHDr8Kw9nJQgCFEVBs9mEJEmpi+B6TkmS0Gg00Gq1Ep/zYVWtVoMkSTR+GZVKBfV6HaVSiQ5FiJWRZRnVapXGL+f7Fn9ErEyWHaFUKhUaRYiVKZfLNMoMURRpFCFWJskBXkWSCxsr8258lEzsotnpdG7bSVmv19hsNjgcDjBNkw5HYIxB13Ua/8jxeKTRHdw6czqdMJvNMJ/PYRjGnUir1QJjDIyxW6aqKhhj6Pf7t+xZuMksFgvs93saAwCm0yl0Xb91QFVVTCYT6LqOwWBAy/8ZLjK73Q6GYdD4RrfbvdtvNpt3+7zgIrPdbmmUCVxk8gIXGUVRaJQJXGR4PsTPwEWm3W5D0zQavxwuMgAwGo2gaVqin+ppwU0GV6Gvry+Mx2MwxtDr9WhJqnCV+WYwGEDX9cj6kjapyGRFIZNXCpm88lEy3L800+RlX5p54P+ROZ/PNMqMJHOJlQmCgEaZ8bSM7/s0ygzP82gUIVbGcRy4rkvjl+O6bqJ5xMoAgG3bmXbI933Yto3L5fF/Lx7KhGEI0zRhWRY8z0t00Ge5XC7wPA+WZcE0TYRhSEt+5G7RfHceduadKGTySiGTVz5K5g9M3a1YxckfEAAAAABJRU5ErkJggg==" alt="Image"> .</p>
<p>Examples:</p>
<p>Correct: 5 mm, 12 V 20 °C</p>
<p>Incorrect: 5mm, 12V, 20°C</p>
<p>Note: Do not add space before percentage symbols.</p>
<p>Correct: 5%</p>
<p>Incorrect: 5 %</p>
</div></details>
<details class="sec l3" open><summary id="capitalization"><h3>Capitalization</h3></summary><div class="section-body">
<p>Unit symbols are written in lowercase, except where SI rules require uppercase (A, V, W, Pa, K, °C, Hz).</p>
<p>Example:</p>
<p>A (ampere), V (volt), W (watts), Pa (pascal), K (kelvin)</p>
<p>Unit names (For example, watt, pascal, volt) are written in lowercase unless beginning a sentence.</p>
</div></details>
<details class="sec l3" open><summary id="plural-rules"><h3>Plural Rules</h3></summary><div class="section-body">
<p>Unit symbols never take plural forms.</p>
<p>Examples:</p>
<p>Correct: 5 kg, 3 lb, 10 oz</p>
<p>Incorrect: 5 kgs, 3 lbs, 10 ozs</p>
</div></details>
<details class="sec l3" open><summary id="consistency-rules"><h3>Consistency Rules</h3></summary><div class="section-body">
<p>Use one unit system per specification when possible (avoid mixing SI + imperial unless required).</p>
<p>Provide ranges with an en dash and a non-breaking space before each unit.</p>
<p>Examples:</p>
<p>Correct: 5–10 mm, 2–4 V</p>
</div></details>
<details class="sec l3" open><summary id="examples-of-standard-formatting"><h3>Examples of Standard Formatting</h3></summary><div class="section-body">
<p>40 °C</p>
<p>3 s</p>
<p>10 min</p>
<p>8 h</p>
<p>120 x 80 x 40 mm</p>
<p>100 N·m</p>

<details class="sec l2" open><summary id="acronyms-and-abbreviations"><h2>Acronyms and Abbreviations</h2></summary><div class="section-body">
<p>Acronyms and abbreviations must be used consistently and introduced correctly to maintain clarity and prevent ambiguity.</p>
<details class="sec l3" open><summary id="first-use"><h3>First Use</h3></summary><div class="section-body">
<p>Spell out the full term the first time it appears, followed by the acronym in parentheses.</p>
<p>Example:</p>
<p>Human Machine Interface (HMI)
User Interface (UI)</p>
<p>Graphical User Interface (GUI)</p>
</div></details>
<details class="sec l3" open><summary id="form-plurals-correctly"><h3>Form Plurals Correctly</h3></summary><div class="section-body">
<p>Form plural acronyms without an apostrophe.</p>
<p>Example:</p>
<p>Correct: SMEs</p>
<p>Incorrect: SME’s</p>
<p>Do not use periods in acronyms</p>
<p>Example:</p>
<p>Correct: PLC</p>
<p>Incorrect: P.L.C.</p>
</div></details>
<details class="sec l3" open><summary id="use-abbreviations-for-time"><h3>Use Abbreviations for Time</h3></summary><div class="section-body">
<p>Use the singular unit after the number.</p>
<p>Examples:</p>
<p>5 s, 10 min, 8 h</p>
<p>Wait 10 min for completion.</p>
</div></details>
<details class="sec l3" open><summary id="use-acronyms-consistently-across-manuals"><h3>Use Acronyms Consistently Across Manuals</h3></summary><div class="section-body">
<p>Do not switch between variants (For example, UI Screen vs HMI Screen). </p>
<p>Select one tern based on product context and use it through.</p>
<div class="table-wrap styled"><table class="styled">
<tr>
<th>Word </th>
<th>Description </th>
<th>DCC (use when) </th>
<th>Example </th>
<th>Best Practice </th>
</tr>
<tr>
<td>UI (User Interface) </td>
<td>Refers to any interface between a user and a system – software, hardware, web, etc... </td>
<td>Describing general interface concepts, especially in software documentation or when the interface isn&#x27;t specific to industrial equipment.  General software or system interface   </td>
<td>The user interface allows operators to configure system parameters </td>
<td>Define the term on first use.  Be consistent throughout the document once you&#x27;ve chosen the appropriate term.</td>
</tr>
<tr>
<td>GUI (Graphical User Interface) </td>
<td>Subset of UI: Specifically refers to interfaces that use graphical elements (buttons, icons, windows) </td>
<td>Highlighting the visual aspect of the interface, especially in software applications or control systems with screens  Visual interface with graphical elements  </td>
<td>The GUI displays real-time data trends and alarm notifications </td>
<td> </td>
</tr>
<tr>
<td>HMI (Human Machine Interface) </td>
<td>Common in automation, manufacturing, and industrial control systems. </td>
<td>Referring to physical or software interfaces between operators and machines (e.g., touchscreens on PLCs, SCADA systems  Industrial control systems, machinery, SCADA, PLCs  </td>
<td>The HMI panel provides access to machine status and control functions </td>
<td> </td>
</tr>
</table></div>
</div></details>
</div></details>
<details class="sec l2" open><summary id="hyphen-and-en-dash"><h2>Hyphen and En Dash</h2></summary><div class="section-body">
<p>Hyphens and dashes must be used correctly to maintain clarity and precision in technical writing.</p>
<details class="sec l3" open><summary id="hyphen"><h3>Hyphen</h3></summary><div class="section-body">
<p>Use a hyphen (-) to join words that function together as a compound modifier before a noun. </p>
<p>Examples:</p>
<p>High-accuracy sensor</p>
<p>Two-step process</p>
<p>Safety-critical function</p>
<p>User-define setting</p>
<p>Hyphens prevent misreading by making the modifier act as a single unit.</p>
</div></details>
<details class="sec l3" open><summary id="en-dash"><h3>En Dash</h3></summary><div class="section-body">
<p>Use an en dash (–) to indicate ranges or connections between values (10–20 V). Keyboard Shortcut: Press Windows key + minus (-) to insert an en dash.</p>
</div></details>
<details class="sec l3" open><summary id="em-dash"><h3>Em Dash</h3></summary><div class="section-body">
<p>Avoid using em dashes in technical documentation because they make sentences longer and harder to read. If a sentence requires an em dash, rewrite it for clarity instead.</p>
<p>Not Recommended: The motor—when overloaded—may shut down unexpectedly.</p>
<p>Better: The motor may shut down unexpectedly when overloaded.</p>
</div></details>
</div></details>
<details class="sec l2" open><summary id="numerals-vs-words"><h2>Numerals vs Words</h2></summary><div class="section-body">
<p>Use numerals and written words consistently to improve clarity and readability in technical documentation.</p>
<details class="sec l3" open><summary id="numeral-usage"><h3>Numeral Usage</h3></summary><div class="section-body">
<div class="table-wrap styled"><table class="styled">
<tr>
<th>Usage</th>
<th>Example</th>
</tr>
<tr>
<td>All measurements regardless of value (SI units, dimensions, tolerances, values)</td>
<td>5 mm12 in.10 V</td>
</tr>
<tr>
<td>Steps, references, and identifiers</td>
<td>Step 3, Figure 2, Table 4, Section 2.3</td>
</tr>
<tr>
<td>Time values</td>
<td>3 s, 10 min, 8 h</td>
</tr>
<tr>
<td>Dates</td>
<td>5 Feb 2026(follow Akribis format)</td>
</tr>
<tr>
<td>Dimensions</td>
<td>120 x 80 x 40 mm</td>
</tr>
<tr>
<td>Ranges (always use an en dash)</td>
<td>5–10 mm, 2–4 V</td>
</tr>
<tr>
<td>Quantities and enumerations</td>
<td>Use 3 bolts and 2 washers</td>
</tr>
</table></div>
</div></details>
<details class="sec l3" open><summary id="words-usage"><h3>Words Usage</h3></summary><div class="section-body">
<p>Number 10 and below in procedures.</p>
<p>Examples:</p>
<p>Remove two screws to open the cover.</p>
<p>Two brackets are installed on the panel.</p>
<p>Use 5-10 mm of clearance.</p>
<p>(Exception: measurement always use numerals)</p>
<p>The procedure takes 20 min to complete.</p>
<p>The system includes three access levels.</p>
<p>(If the number is not measurable data, writing it out is preferred.)</p>
</div></details>
</div></details>
<details class="sec l2" open><summary id="articles"><h2>Articles</h2></summary><div class="section-body">
<p>Articles must always be followed by a noun or noun phrase.</p>
<details class="sec l3" open><summary id="definite-article"><h3>Definite Article</h3></summary><div class="section-body">
<p>Use “the + singular noun” when referring to one specific, identifiable part.</p>
<p>Replace the cover.</p>
<p>Remove the bracket from the housing.</p>
<p>Use “the + plural noun” when referring to a specific, known group of items.</p>
<p>Tighten the screws to 2 N·m.</p>
</div></details>
<details class="sec l3" open><summary id="plural-nouns-without-articles"><h3>Plural Nouns without Articles</h3></summary><div class="section-body">
<p>Use plural nouns without articles when referring to items in a general sense, not specific instances.</p>
<p>Replace covers on all units.</p>
<p>Inspect cables before powering on.</p>
</div></details>
<details class="sec l3" open><summary id="ui-and-software-article-rules"><h3>UI and Software Article Rules</h3></summary><div class="section-body">
<p>When referencing UI elements:</p>
<p>Use an article when referring to the noun phrase.</p>
<p>Click the Reset button.</p>
<p>Select the Language option.</p>
<p>Open the Settings menu</p>
<p>Do not use an article when referencing the UI label itself.</p>
<p>Click Start.</p>
<p>Open Settings.</p>
<p>Navigate to File  Save as.</p>
<p>This matches UI-writing standards: a UI label is treated as a proper noun, while a button/option is a noun phrase requiring an article.</p>
</div></details>
<details class="sec l3" open><summary id="general-rules"><h3>General Rules</h3></summary><div class="section-body">
<p>Articles are optional in imperative steps but must be used when required for clarity.</p>
<p>Keep article usage consistent within the same topic.</p>
</div></details>
</div></details>
<details class="sec l2" open><summary id="cross-references"><h2>Cross references</h2></summary><div class="section-body">
<p>Cross references help users find related content quickly and reliably.</p>
<p>Use references with labels and number when pointing to specific items within the same document.</p>
<p>Examples:</p>
<p>See Figure 3, See Section 6.4, See Table 2, See page 12</p>
<p>Capitalize Figure, Table, and Section when referencing a specific numbered item.</p>
<p>Use “See” for short, internal references.</p>
<p>Use “Refer to” for external or extended references.</p>
<p>Manual and publication titles: Italic</p>
<p>Example:</p>
<p>Refer to the General Operating Manual for more information.</p>
<p>Refer to the ZIRCONIA MILLING CELL MAINTENANCE MANUAL (full title) for more information.</p>
</div></details>
<details class="sec l2" open><summary id="capitalization-2"><h2>Capitalization</h2></summary><div class="section-body">
<details class="sec l3" open><summary id="headings"><h3>Headings</h3></summary><div class="section-body">
<p>Use Title Case for chapter and section headings.</p>
</div></details>
<details class="sec l3" open><summary id="captions"><h3>Captions</h3></summary><div class="section-body">
<p>Use Title Case for figure and table captions. Keep them short.</p>
<p>Captions: Use the Title Case for captions.</p>
</div></details>
<details class="sec l3" open><summary id="sentences"><h3>Sentences</h3></summary><div class="section-body">
<p>Use sentence case for normal text strings. Capitalize the first word of the sentence, proper nouns, and terms that are capitalized by rule. See Table 7.</p>
</div></details>
<details class="sec l3" open><summary id="ui-and-labels"><h3>UI and Labels</h3></summary><div class="section-body">
<p>Match on-screen capitalization exactly for UI labels.</p>
<p>Use bold for UI labels in text.</p>
</div></details>
<details class="sec l3" open><summary id="capitalization-style-for-common-terms"><h3>Capitalization Style for Common Terms</h3></summary><div class="section-body">
<p>Table 7: Capitalization Style for Common Terms</p>
<div class="table-wrap styled"><table class="styled">
<tr>
<th>Term </th>
<th>Style </th>
</tr>
<tr>
<td>Control Box </td>
<td>Do not treat it as a proper noun unless the control box has an assigned name.  Examples: (Correct) The controller is located in the control box. (Correct) The controller is located in the Main Control Box.  (Incorrect) The controller is located in the Control Box. </td>
</tr>
<tr>
<td>Conveyor </td>
<td>Do not treat it as a proper noun unless the conveyor has an assigned name.  Examples: (Correct) The parts are delivered to the conveyor. (Correct) The parts are delivered to Conveyor 1.  (Incorrect) The parts are delivered to the Conveyor. </td>
</tr>
<tr>
<td>Desktop </td>
<td>Do not treat it as a proper noun.  Examples: (Correct) Launch the application from the desktop.  (Incorrect) Launch the application from the Desktop. </td>
</tr>
<tr>
<td>Door </td>
<td>Do not treat it as a proper noun unless the door has an assigned name.  Examples: (Correct) There are three machine doors. (Correct) Open Door 1.  (Incorrect) There are three machine Doors. (Incorrect) There are three Machine Doors. </td>
</tr>
<tr>
<td>Emergency Stop / E-stop </td>
<td>Use emergency stop on the first mention, then abbreviate as E-stop for the rest of the document.  Examples: (Correct) Press the emergency stop (E-stop). The E-stop is used to stop the machine in the event of an emergency.  (Incorrect) Press the e-stop. (Incorrect) Press the ESTOP. (Incorrect) Press the Emergency Stop. </td>
</tr>
<tr>
<td>Graphical User Interface </td>
<td>Capitalize as Graphical User Interface for the first mention, then abbreviate as GUI for the rest of the document.  Example: (Correct) Access the Graphical User Interface (GUI). The GUI allows the user to control the machine.  (Incorrect) Access the graphical user interface. (Incorrect) Access the graphical User Interface. (Incorrect) Access the Graphical user interface. </td>
</tr>
<tr>
<td>Gripper </td>
<td> Do not treat it as a proper noun unless the gripper has an assigned name.  Examples: (Correct) Clean the gripper. (Correct) Align Gripper 1. (Correct) Align the SPC Transfer Gripper.  (Incorrect) Clean the Gripper. (Incorrect) There are two Grippers in the machine. </td>
</tr>
<tr>
<td>Human Machine Interface </td>
<td>Capitalize as Human-Machine Interface for the first mention, then abbreviate as HMI for the rest of the document.  Examples: (Correct) Use the Human-Machine Interface (HMI) to control the machine. The HMI is located at the front of the machine.  (Incorrect) Use the human-machine interface to control the machine. </td>
</tr>
<tr>
<td>Machine name </td>
<td>Capitalize machine names.  Examples: (Correct) Stain-Glaze Automation Machine (Correct) SPC Punch and Pack Machine (Correct) Antenna Punch and Pack Machine  (Incorrect) stain-glaze automation machine (Incorrect) SPC punch and pack machine (Incorrect) antenna Punch and Pack machine </td>
</tr>
<tr>
<td>Module name </td>
<td>Capitalize module names.  Examples: (Correct) Stamping and Singulation Module (Correct) Tape and Seal Module (Correct) XY Transporter Chuck Module  (Incorrect) stamping and singulation module (Incorrect) Tape and seal module (Incorrect) XY transporter chuck module </td>
</tr>
<tr>
<td>Nameplate </td>
<td>Do not treat it as a proper noun.  Examples: (Correct) The information can be found on the nameplate.  (Incorrect) The information can be found on the Nameplate. </td>
</tr>
<tr>
<td>Personal Protective Equipment </td>
<td>Capitalize as Personal Protective Equipment for the first mention, then abbreviate as PPE for the rest of the document.  (Correct) Put on the appropriate Personal Protective Equipment (PPE).  (Incorrect) Put on the appropriate personal protective equipment. </td>
</tr>
<tr>
<td>Picker </td>
<td>Do not treat it as a proper noun unless the picker has an assigned name.  Examples: (Correct) Clean the picker. (Correct) Align Picker 1.  (Incorrect) Clean the Picker. </td>
</tr>
<tr>
<td>Push button </td>
<td>Do not treat it as a proper noun.  Examples: (Correct) There are three push buttons. (Correct) Push buttons are used to start and stop the machine.  (Incorrect) There are three Push Buttons. </td>
</tr>
<tr>
<td>Run modes  (e.g., production, dry run, maintenance) </td>
<td>Don&#x27;t Capitalize &#x27;mode&#x27;.  Examples: (Correct) Run the machine in Production mode.  (Incorrect) Run the machine in Production Mode. </td>
</tr>
<tr>
<td>Safe Torque Off </td>
<td>Capitalize as Safe Torque Off for first mention, then abbreviate as STO for the rest of the document.  Examples: (Correct) The Safe Torque Off (STO) function prevents the motor from restarting unexpectedly. Run the machine in Maintenance mode to bypass STO.  (Incorrect) Run the machine in Maintenance mode to bypass safe torque off. </td>
</tr>
<tr>
<td>Tower Light </td>
<td>Do not treat it as a proper noun.  Examples: (Correct) There is one tower light. (Correct) Tower lights are installed on the machine.  (Incorrect) There is one Tower Light. </td>
</tr>
<tr>
<td>Main input material </td>
<td>Capitalize the main input material.  Example:  (Correct) Remove the Antenna from machine track. (Correct) The SCARA picks the Crown from the tray. </td>
</tr>
<tr>
<td>Not </td>
<td>Uppercase to emphasis the &#x27;not&#x27; of not to do action. Use standard sentence case. Example: (Correct) Do not open the machine door. </td>
</tr>
<tr>
<td>On / Off </td>
<td>Uppercase to emphasis for turning on or off the switch and etc.Use standard sentence case.  Example:  (Correct) Turn on the heater. </td>
</tr>
<tr>
<td>View of mechanical drawing </td>
<td>Capitalize to emphasis the specific view of the mentioned object.  Example: (Correct) Refer to the Front View of the machine.</td>
</tr>
<tr>
<td>Button Name </td>
<td>Capitalize the specific button name. ALL CAPS for hardware buttons / Exactly the same as the label on the machine (if any).Example: (Correct) Press the START button. </td>
</tr>
<tr>
<td>Specific position </td>
<td>Capitalize the specific position. Use standard sentence case Example:  (Correct) At the unloading position, the gripper picks the part from the pallet. </td>
</tr>
<tr>
<td>Chapter / Section </td>
<td>Capitalize the specific chapter or section.  Example:  (Correct) Refer to Chapter 2, Section 2.5 for more details. </td>
</tr>
<tr>
<td>I/O </td>
<td>Uppercase the input/output abbreviation.  Example: (Correct) Refer to the table below for the I/O list. </td>
</tr>
<tr>
<td> Trademarks/Brands/Third Party</td>
<td>Capitalize trademarks and brand names exactly as registered (even if the style is odd, do not correct it. A trademark must describe a generic product type.Examples:EPSON industrial robotMicrosoft Teams applicationiPhone smartphoneGoogle Cloud platformEthernet protocolWi-Fi technologyAutoCAD softwareFirst use (company legal policy)Trademarks must be adjectives, not nounsExamples:(Correct) PowerFlex drive / Excel software(Incorrect) a PowerFlex / a BluetoothDo not use trademarks in possessive or plural form.Examples(Correct) The PowerFlex drive(Incorrect) PowerFlex performance</td>
</tr>
</table></div>
</div></details>
</div></details>
<details class="sec l2" open><summary id="formatting"><h2>Formatting</h2></summary><div class="section-body">
<details class="sec l3" open><summary id="general-formatting-principles"><h3>General Formatting Principles</h3></summary><div class="section-body">
<p>Use the EQ_DCC template for all documentation.</p>
<p>Apply the predefined styles in the template for:</p>
<p>Headings</p>
<p>Body text</p>
<p>Tables</p>
<p>Captions</p>
<p>Notes, warnings, and cautions</p>
<p>Do not manually override fonts, sizes, or spacing when a style exists.</p>
</div></details>
<details class="sec l3" open><summary id="citation"><h3>Citation</h3></summary><div class="section-body">
<p>Write all citations in italics (apply only to the title not the entire sentence), whether they are:</p>
<p>User manual titles</p>
<p>Standard references</p>
<p>Third-party references</p>
<p>Technical reports</p>
<p>Work Instructions</p>
<p>Textbook names</p>
<p>Preserve the original casing of third-party manuals and documents titles. Do not correct or modify the capitalization of external documents. If the third-party title uses unusual capitalization, maintain it exactly as published.</p>
<p>Examples:</p>
<p>Refer to the 6-Axis Robots C8 series MANIPULATOR MANUAL for more information.</p>
</div></details>
<details class="sec l3" open><summary id="bold"><h3>Bold</h3></summary><div class="section-body">
<p>Use bold for UI elements (buttons, tabs, menus, directories) and match on-screen casing exactly.</p>
<p>Do not use bold for field names. Follow Title Case instead or match on-screen.</p>
<p>Do not use bold for hardware buttons. Use ALL CAPS matching the physical label.</p>
<p>Use bold selectively to avoid visual noise in software manuals.</p>
</div></details>

<details class="sec l3" open><summary id="periods-in-complete-sentences-and-paragraphs"><h3>Periods in Complete Sentences and Paragraphs</h3></summary><div class="section-body">
<p>Use a period at the end of every complete sentence or full paragraph in running text.</p>
</div></details>
<details class="sec l3" open><summary id="periods-in-tables"><h3>Periods in Tables</h3></summary><div class="section-body">
<p>Do not use periods in table cells if the content is:</p>
<p>a phrase</p>
<p>a single word</p>
<p>a label</p>
<p>a list item</p>
<p>Use a period only if the table cell contains a full sentence.</p>
</div></details>
<details class="sec l3" open><summary id="periods-in-bulleted-and-numbered-lists"><h3>Periods in Bulleted and Numbered Lists</h3></summary><div class="section-body">
<p>No period at the end of a bullet unless the bullet is a complete sentence.</p>
<p>If bullets are fragments, omit the period.</p>
<p>If bullets are full sentences, use a period consistently for all bullets in that group.</p>
<p>Example – No periods (fragments):</p>
<p>Mount the bracket</p>
<p>Install the screws</p>
<p>Connect power</p>
<p>Example – Periods (full sentences):</p>
<p>Mount the bracket to the enclosure.</p>
<p>Install the screws in the marked positions.</p>
</div></details>
<details class="sec l3" open><summary id="periods-in-steps"><h3>Periods in Steps</h3></summary><div class="section-body">
<p>Use periods consistently within procedural steps. Choose either:</p>
<p>Imperative fragments without periods,</p>
<p>or</p>
<p>Full sentences with periods.</p>
<p>Whichever you choose, apply it consistently for all steps in the same procedure.</p>
</div></details>

<details class="sec l1" open><summary id="best-practices-for-technical-writers"><h1>Best Practices for Technical Writers</h1></summary><div class="section-body">
<p>Write semantically. Choose tags/styles based on meaning, not formatting.</p>
<p>Keep topics short and focused. One purpose per topic: Concept = what, Task = how, Reference = facts.</p>
<p>Avoid bold/italic/all caps unless conveying real meaning, not style.</p>
<p>Write step instructions as actions. Start each step with an imperative verb.</p>
</div></details>

<script>
document.addEventListener("DOMContentLoaded", function () {

    const searchBtn = document.getElementById("searchBtn");
    const clearBtn = document.getElementById("clearBtn");
    const expandBtn = document.getElementById("expandAll");
    const collapseBtn = document.getElementById("collapseAll");
    const input = document.getElementById("searchInput");
    const content = document.getElementById("content");

    // ✅ SEARCH
    if (searchBtn) {
        searchBtn.addEventListener("click", function () {
            const keyword = input.value.toLowerCase();

            const elements = content.querySelectorAll("*");
            elements.forEach(el => {
                if (el.children.length === 0) {
                    const text = el.innerText.toLowerCase();
                    el.style.backgroundColor = text.includes(keyword) ? "yellow" : "";
                }
            });
        });
    }

    // ✅ CLEAR
    if (clearBtn) {
        clearBtn.addEventListener("click", function () {
            input.value = "";
            const elements = content.querySelectorAll("*");
            elements.forEach(el => el.style.backgroundColor = "");
        });
    }

    // ✅ EXPAND ALL
    if (expandBtn) {
        expandBtn.addEventListener("click", function () {
            document.querySelectorAll("details").forEach(d => d.open = true);
        });
    }

    // ✅ COLLAPSE ALL
    if (collapseBtn) {
        collapseBtn.addEventListener("click", function () {
            document.querySelectorAll("details").forEach(d => d.open = false);
        });
    }

});
</script>
