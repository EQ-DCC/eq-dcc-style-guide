<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>EQ DCC Style Guide</title>

<style>
body {
  font-family: Segoe UI, Arial, sans-serif;
  margin: 0;
  background: #f4f6f9;
}

.topbar {
  display: flex;
  gap: 8px;
  padding: 10px 20px;
  background: white;
  border-bottom: 1px solid #ddd;
}

header {
  background: #2f5597;
  color: white;
  padding: 15px 20px;
}

.container {
  display: flex;
}

.sidebar {
  width: 300px;
  background: white;
  border-right: 1px solid #ddd;
  padding: 10px;
  height: calc(100vh - 90px);
  overflow-y: auto;
}

.sidebar a {
  display: block;
  padding: 6px;
  text-decoration: none;
  color: #333;
}

.sidebar a:hover {
  background: #e6ecf8;
}

main {
  flex: 1;
  padding: 20px;
}

details.sec {
  background: white;
  border: 1px solid #ddd;
  border-radius: 6px;
  margin-bottom: 12px;
  padding: 12px;
}

summary {
  font-weight: bold;
  cursor: pointer;
}

table {
  border-collapse: collapse;
  width: 100%;
  margin: 10px 0;
}

td, th {
  border: 1px solid #ccc;
  padding: 6px;
}

th {
  background: #eee;
}

mark { background: yellow; }
mark.active { background: orange; }
.hidden { display: none; }
</style>

</head>
<body>

<div class="topbar">
  <input id="q" placeholder="Search...">
  <button data-action="
  <button data-action="clear
  <button data-action="expand-all collapse-allCollapse All</button>
</div>

<header>
  <h2>EQ DCC Style Guide</h2>
</header>

<div class="container">

<nav class="sidebar">
  <a class="toc-btn" data-target="purpose">Guide Overview</a>
  <a class="toc-btn" data-target="writing">Writing Principles</a>
  <a class="toc-btn" data-target="grammar">Grammar & Style Rules</a>
  <a class="toc-btn" data-target="measurement">Measurement & Units</a>
  <a class="toc-btn" data-target="acronyms">Acronyms</a>
  <a class="toc-btn" data-target="punctuation">Punctuation</a>
  <a class="toc-btn" data-target="capitalization">Capitalization</a>
</nav>

<main>

<!-- ✅ PURPOSE -->
<details class="sec">
<summary id="purpose">EQ DCC Style Guide</summary>

<h4>Figure 1: Document Properties</h4>
<table>
<tr><th>PDF Field</th><th>Required Value</th></tr>
<tr><td>Title</td><td>Full document title (Subject + Category + Revision number)</td></tr>
<tr><td>Author</td><td>Document owner, team, or company name</td></tr>
<tr><td>Subject</td><td>Product or system name</td></tr>
<tr><td>Keywords</td><td>Leave blank unless required (Author defined values)</td></tr>
</table>

<p><b>Note:</b> Do not include internal-only information in PDF metadata.</p>

<ul>
<li>Indexing by documentation systems</li>
<li>Automated publishing workflows</li>
<li>Translation platforms</li>
<li>Version control tools</li>
</ul>

</details>

<!-- ✅ WRITING -->
<details class="sec">
<summary id="writing">Writing Principles</summary>

<h4>Use Active Voice</h4>
<p>Use passive voice only when necessary.</p>

<h4>Avoid Gerunds</h4>
<p>Use base verb forms.</p>

<h4>Use Imperative Commands</h4>
<ul>
<li>Install the bracket</li>
<li>Connect the cable</li>
<li>Verify alignment</li>
</ul>

<h4>Preferred Voice</h4>
<p>Use neutral third-person terms.</p>

</details>

<!-- ✅ GRAMMAR -->
<details class="sec">
<summary id="grammar">Grammar and Style Rules</summary>

<h4>Terminology</h4>
<p>Ensure consistent terminology.</p>

<h4>Common Terms to Avoid</h4>

<table>
<tr><th>Avoid</th><th>Reason</th><th>Recommended</th></tr>
<tr><td>may</td><td>Unclear</td><td>can</td></tr>
<tr><td>abort</td><td>Harsh</td><td>cancel</td></tr>
<tr><td>etc.</td><td>Vague</td><td>explicit list</td></tr>
<tr><td>fast</td><td>Vague</td><td>use metric</td></tr>
</table>

</details>

<!-- ✅ MEASUREMENT -->
<details class="sec">
<summary id="measurement">Measurement and Units</summary>

<ul>
<li>Correct: 5 mm</li>
<li>Incorrect: 5mm</li>
</ul>

<h4>SI Units</h4>

<table>
<tr><th>Symbol</th><th>Unit</th><th>Description</th></tr>
<tr><td>V</td><td>volt</td><td>Voltage</td></tr>
<tr><td>A</td><td>ampere</td><td>Current</td></tr>
<tr><td>W</td><td>watt</td><td>Power</td></tr>
<tr><td>Pa</td><td>pascal</td><td>Pressure</td></tr>
<tr><td>°C</td><td>Celsius</td><td>Temperature</td></tr>
</table>

</details>

<!-- ✅ ACRONYMS -->
<details class="sec">
<summary id="acronyms">Acronyms and Abbreviations</summary>

<ul>
<li>Human Machine Interface (HMI)</li>
<li>User Interface (UI)</li>
<li>Graphical User Interface (GUI)</li>
</ul>

</details>

<!-- ✅ PUNCTUATION -->
<details class="sec">
<summary id="punctuation">Punctuation</summary>

<ul>
<li>Use serial comma</li>
<li>Use periods for full sentences</li>
<li>No period for fragments</li>
</ul>

</details>

<!-- ✅ CAPITALIZATION -->
<details class="sec">
<summary id="capitalization">Capitalization</summary>

<ul>
<li>Use Title Case for headings</li>
<li>Use sentence case for text</li>
<li>Match UI labels exactly</li>
</ul>

</details>

<!-- ✅ NUMERALS VS WORDS -->
<details class="sec">
<summary id="numerals">Numerals vs Words</summary>

<h4>Numeral Usage</h4>

<table>
<tr><th>Usage</th><th>Example</th></tr>
<tr><td>Measurements</td><td>5 mm, 10 V</td></tr>
<tr><td>Steps</td><td>Step 3, Table 4</td></tr>
<tr><td>Time</td><td>3 s, 10 min</td></tr>
<tr><td>Dimensions</td><td>120 x 80 x 40 mm</td></tr>
<tr><td>Ranges</td><td>5–10 mm</td></tr>
</table>

<h4>Words Usage</h4>
<p>Use words for non-measurable quantities under 10.</p>

<ul>
<li>Remove two screws</li>
<li>The system includes three levels</li>
</ul>

</details>


<!-- ✅ ARTICLES -->
<details class="sec">
<summary id="articles">Articles</summary>

<h4>Definite Article</h4>
<ul>
<li>Replace the cover</li>
<li>Remove the bracket</li>
</ul>

<h4>Plural without Articles</h4>
<ul>
<li>Replace covers</li>
<li>Inspect cables</li>
</ul>

<h4>UI Rules</h4>
<ul>
<li>Click the Reset button</li>
<li>Click Start</li>
</ul>

</details>


<!-- ✅ CROSS REFERENCES -->
<details class="sec">
<summary id="crossref">Cross References</summary>

<ul>
<li>See Figure 3</li>
<li>See Section 6.4</li>
<li>Refer to manuals in italics</li>
</ul>

</details>


<!-- ✅ CAPITALIZATION -->
<details class="sec">
<summary id="capitalization2">Capitalization Rules</summary>

<h4>Headings</h4>
<p>Use Title Case.</p>

<h4>Text</h4>
<p>Use sentence case.</p>

<h4>UI Labels</h4>
<p>Match system labels exactly.</p>

</details>


<!-- ✅ SI UNIT TABLE -->
<details class="sec">
<summary id="units">SI Unit Symbols</summary>

<table>
<tr><th>Symbol</th><th>Unit Name</th><th>Description</th></tr>
<tr><td>V</td><td>Volt</td><td>Voltage</td></tr>
<tr><td>A</td><td>Ampere</td><td>Current</td></tr>
<tr><td>W</td><td>Watt</td><td>Power</td></tr>
<tr><td>Pa</td><td>Pascal</td><td>Pressure</td></tr>
<tr><td>N</td><td>Newton</td><td>Force</td></tr>
<tr><td>N·m</td><td>Torque</td><td>Rotational force</td></tr>
<tr><td>Hz</td><td>Hertz</td><td>Frequency</td></tr>
<tr><td>°C</td><td>Celsius</td><td>Temperature</td></tr>
<tr><td>kg</td><td>Kilogram</td><td>Mass</td></tr>
<tr><td>mm</td><td>Millimeter</td><td>Length</td></tr>
</table>

</details>


<!-- ✅ ACRONYMS TABLE -->
<details class="sec">
<summary id="acronyms-table">UI / GUI / HMI Definitions</summary>

<table>
<tr>
<th>Word</th>
<th>Description</th>
<th>Usage</th>
<th>Example</th>
</tr>

<tr>
<td>UI</td>
<td>General interface</td>
<td>Software interface</td>
<td>User interface allows control</td>
</tr>

<tr>
<td>GUI</td>
<td>Graphical interface</td>
<td>Visual UI</td>
<td>Displays real-time data</td>
</tr>

<tr>
<td>HMI</td>
<td>Industrial interface</td>
<td>Machine systems</td>
<td>HMI panel provides control</td>
</tr>

</table>

</details>


<!-- ✅ PUNCTUATION -->
<details class="sec">
<summary id="punctuation2">Punctuation</summary>

<ul>
<li>Use serial comma</li>
<li>Use periods for full sentences</li>
<li>No periods for fragments</li>
</ul>

</details>


<!-- ✅ COMPOUND NOUNS -->
<details class="sec">
<summary id="compound">Compound Nouns</summary>

<table>
<tr><th>Correct</th><th>Incorrect</th></tr>
<tr><td>backflow</td><td>back flow</td></tr>
<tr><td>gearbox</td><td>gear box</td></tr>
<tr><td>workflow</td><td>work flow</td></tr>
<tr><td>toolbox</td><td>tool box</td></tr>
<tr><td>workpiece</td><td>work piece</td></tr>
</table>

</details>


<!-- ✅ BEST PRACTICES -->
<details class="sec">
<summary id="best">Best Practices for Technical Writers</summary>

<ul>
<li>Write semantically</li>
<li>Keep topics short</li>
<li>One purpose per topic</li>
<li>Use imperative steps</li>
<li>Avoid unnecessary formatting</li>
</ul>

</details>
</main>
</div>
